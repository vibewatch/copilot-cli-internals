name: Deploy website to GitHub Pages

# Opt-in: enable Pages in repo settings (Source: GitHub Actions) to activate.
# The build automatically uses the correct site URL and base path for the
# repo it's running in via the GITHUB_* env vars below — no manual edits
# required for project pages at https://<owner>.github.io/<repo>/.

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - 'docs/**'
      - '.github/workflows/deploy-website.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: website/pnpm-lock.yaml
      - name: Install dependencies
        working-directory: website
        run: pnpm install --frozen-lockfile
      - name: Build site
        working-directory: website
        env:
          DEPLOY_TARGET: github-pages
          # https://<owner>.github.io  (e.g. https://acme.github.io)
          SITE_URL: https://${{ github.repository_owner }}.github.io
          # /<repo>  (e.g. /copilot-cli-internals)
          SITE_BASE: /${{ github.event.repository.name }}
        run: pnpm build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
