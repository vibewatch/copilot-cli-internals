<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Hedgehog with magnifying glass investigating">
  <title>Investigating hedgehog</title>
  <!-- Spike cluster -->
  <g fill="#33342d">
    <polygon points="44,48 50,30 56,48"/>
    <polygon points="54,44 60,24 66,44"/>
    <polygon points="64,42 70,22 76,42"/>
    <polygon points="74,44 80,24 86,44"/>
    <polygon points="84,48 90,30 96,48"/>
    <polygon points="38,56 34,40 46,48"/>
  </g>
  <!-- Body -->
  <ellipse cx="68" cy="80" rx="42" ry="30" fill="#6c6e63"/>
  <!-- Belly -->
  <ellipse cx="68" cy="88" rx="30" ry="18" fill="#eeefe9"/>
  <!-- Face -->
  <ellipse cx="100" cy="76" rx="16" ry="12" fill="#fcfcfa"/>
  <!-- Nose -->
  <circle cx="115" cy="76" r="3" fill="#23251d"/>
  <!-- Eye (peering through glass) -->
  <circle cx="102" cy="72" r="2.5" fill="#23251d"/>
  <!-- Magnifying glass — held up by left paw -->
  <g transform="translate(36 56)">
    <!-- Handle -->
    <line x1="0" y1="32" x2="-12" y2="44" stroke="#33342d" stroke-width="4" stroke-linecap="round"/>
    <!-- Glass rim (yellow!) -->
    <circle cx="14" cy="14" r="20" fill="none" stroke="#f7a501" stroke-width="4"/>
    <!-- Glass lens (translucent blue) -->
    <circle cx="14" cy="14" r="18" fill="#dceaf6" opacity="0.55"/>
    <!-- Lens highlight -->
    <ellipse cx="6" cy="6" rx="6" ry="4" fill="#fcfcfa" opacity="0.7"/>
  </g>
  <!-- Paw holding handle -->
  <ellipse cx="32" cy="92" rx="8" ry="6" fill="#6c6e63"/>
  <!-- Feet -->
  <ellipse cx="56" cy="108" rx="8" ry="4" fill="#33342d"/>
  <ellipse cx="84" cy="108" rx="8" ry="4" fill="#33342d"/>
</svg>
