<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Hedgehog waving">
  <title>Waving hedgehog</title>
  <!-- Spike cluster -->
  <g fill="#33342d">
    <polygon points="40,46 46,28 52,46"/>
    <polygon points="50,42 56,22 62,42"/>
    <polygon points="60,40 66,20 72,40"/>
    <polygon points="70,42 76,22 82,42"/>
    <polygon points="80,46 86,28 92,46"/>
    <polygon points="34,54 30,38 42,46"/>
    <polygon points="94,54 98,38 86,46"/>
  </g>
  <!-- Body -->
  <ellipse cx="64" cy="78" rx="42" ry="32" fill="#6c6e63"/>
  <!-- Belly (cream) -->
  <ellipse cx="64" cy="86" rx="30" ry="20" fill="#eeefe9"/>
  <!-- Face -->
  <ellipse cx="98" cy="74" rx="18" ry="14" fill="#fcfcfa"/>
  <!-- Nose -->
  <circle cx="114" cy="74" r="4" fill="#23251d"/>
  <!-- Eye -->
  <circle cx="100" cy="70" r="2.5" fill="#23251d"/>
  <!-- Cheek blush -->
  <circle cx="96" cy="78" r="3" fill="#f7d6d3" opacity="0.8"/>
  <!-- Waving paw (yellow!) -->
  <g transform="translate(36 50) rotate(-25)">
    <rect x="-5" y="-3" width="20" height="8" rx="4" fill="#f7a501"/>
    <circle cx="-6" cy="1" r="5" fill="#f7a501"/>
  </g>
  <!-- Feet -->
  <ellipse cx="50" cy="108" rx="8" ry="4" fill="#33342d"/>
  <ellipse cx="78" cy="108" rx="8" ry="4" fill="#33342d"/>
</svg>
