<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Hedgehog napping in a hammock">
  <title>Hammock hedgehog</title>
  <!-- Hammock rope (left) -->
  <line x1="8" y1="20" x2="32" y2="62" stroke="#6c6e63" stroke-width="1.5"/>
  <!-- Hammock rope (right) -->
  <line x1="120" y1="20" x2="96" y2="62" stroke="#6c6e63" stroke-width="1.5"/>
  <!-- Hammock fabric (yellow stripes!) -->
  <path d="M 24,60 Q 64,98 104,60 L 100,72 Q 64,108 28,72 Z" fill="#f7a501" stroke="#dd9001" stroke-width="1.5"/>
  <path d="M 28,68 Q 64,98 100,68" fill="none" stroke="#23251d" stroke-width="0.8" opacity="0.4"/>
  <!-- Hedgehog body (lying down) -->
  <ellipse cx="64" cy="62" rx="30" ry="14" fill="#6c6e63"/>
  <!-- Spikes (top side, lying horizontal) -->
  <g fill="#33342d">
    <polygon points="44,52 48,42 52,52"/>
    <polygon points="54,50 58,38 62,50"/>
    <polygon points="64,49 68,37 72,49"/>
    <polygon points="74,50 78,38 82,50"/>
    <polygon points="84,52 88,42 92,52"/>
  </g>
  <!-- Face -->
  <ellipse cx="38" cy="66" rx="10" ry="8" fill="#fcfcfa"/>
  <!-- Closed eye (sleeping) -->
  <path d="M 36,66 Q 39,68 42,66" fill="none" stroke="#23251d" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Nose -->
  <circle cx="30" cy="66" r="2.5" fill="#23251d"/>
  <!-- Zzz (purple accent) -->
  <text x="80" y="38" font-family="serif" font-size="14" fill="#7c44a6" font-weight="700">z</text>
  <text x="92" y="30" font-family="serif" font-size="18" fill="#7c44a6" font-weight="700">Z</text>
  <text x="106" y="22" font-family="serif" font-size="22" fill="#7c44a6" font-weight="700">Z</text>
</svg>
