<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Hedgehog in a lab coat">
  <title>Lab-coat hedgehog</title>
  <!-- Spike cluster -->
  <g fill="#33342d">
    <polygon points="40,46 46,28 52,46"/>
    <polygon points="50,42 56,22 62,42"/>
    <polygon points="60,40 66,20 72,40"/>
    <polygon points="70,42 76,22 82,42"/>
    <polygon points="80,46 86,28 92,46"/>
    <polygon points="34,54 30,38 42,46"/>
    <polygon points="94,54 98,38 86,46"/>
  </g>
  <!-- Body -->
  <ellipse cx="64" cy="78" rx="42" ry="32" fill="#6c6e63"/>
  <!-- Lab coat (white) covering belly -->
  <path d="M 30,72 Q 64,118 98,72 L 92,108 Q 64,118 36,108 Z" fill="#fcfcfa" stroke="#bfc1b7" stroke-width="1.5"/>
  <!-- Coat lapel V-shape -->
  <path d="M 56,74 L 64,90 L 72,74" fill="none" stroke="#bfc1b7" stroke-width="1.5"/>
  <!-- Coat pocket -->
  <rect x="74" y="92" width="14" height="10" fill="none" stroke="#bfc1b7" stroke-width="1"/>
  <!-- Pen in pocket (yellow!) -->
  <rect x="78" y="89" width="2.5" height="9" fill="#f7a501"/>
  <!-- Face -->
  <ellipse cx="98" cy="74" rx="18" ry="14" fill="#fcfcfa"/>
  <!-- Glasses -->
  <circle cx="100" cy="70" r="6" fill="none" stroke="#23251d" stroke-width="1.5"/>
  <circle cx="112" cy="70" r="4" fill="none" stroke="#23251d" stroke-width="1.5"/>
  <line x1="106" y1="70" x2="108" y2="70" stroke="#23251d" stroke-width="1.5"/>
  <!-- Nose -->
  <circle cx="118" cy="76" r="3" fill="#23251d"/>
  <!-- Eye behind glasses -->
  <circle cx="100" cy="70" r="1.5" fill="#23251d"/>
  <!-- Feet -->
  <ellipse cx="50" cy="108" rx="8" ry="4" fill="#33342d"/>
  <ellipse cx="78" cy="108" rx="8" ry="4" fill="#33342d"/>
</svg>
