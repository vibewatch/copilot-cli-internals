<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Hedgehog reading a book">
  <title>Reading hedgehog</title>
  <!-- Spike cluster -->
  <g fill="#33342d">
    <polygon points="40,46 46,28 52,46"/>
    <polygon points="50,42 56,22 62,42"/>
    <polygon points="60,40 66,20 72,40"/>
    <polygon points="70,42 76,22 82,42"/>
    <polygon points="80,46 86,28 92,46"/>
    <polygon points="34,54 30,38 42,46"/>
    <polygon points="94,54 98,38 86,46"/>
  </g>
  <!-- Body -->
  <ellipse cx="64" cy="78" rx="42" ry="32" fill="#6c6e63"/>
  <!-- Belly -->
  <ellipse cx="64" cy="86" rx="30" ry="20" fill="#eeefe9"/>
  <!-- Face -->
  <ellipse cx="98" cy="74" rx="18" ry="14" fill="#fcfcfa"/>
  <!-- Reading glasses -->
  <circle cx="100" cy="72" r="5" fill="none" stroke="#23251d" stroke-width="1.5"/>
  <circle cx="112" cy="72" r="4" fill="none" stroke="#23251d" stroke-width="1.5"/>
  <line x1="105" y1="72" x2="108" y2="72" stroke="#23251d" stroke-width="1.5"/>
  <!-- Nose -->
  <circle cx="118" cy="78" r="3" fill="#23251d"/>
  <!-- Eyes (focused) -->
  <circle cx="100" cy="72" r="1.5" fill="#23251d"/>
  <circle cx="112" cy="72" r="1.2" fill="#23251d"/>
  <!-- Open book -->
  <g transform="translate(28 86) rotate(-8)">
    <!-- Book covers (yellow!) -->
    <path d="M 0,0 L 0,28 L 30,32 L 30,4 Z" fill="#f7a501" stroke="#dd9001" stroke-width="1.5"/>
    <path d="M 30,4 L 30,32 L 60,28 L 60,0 Z" fill="#f7a501" stroke="#dd9001" stroke-width="1.5"/>
    <!-- Pages -->
    <path d="M 4,4 L 4,28 L 28,30 L 28,8 Z" fill="#fcfcfa"/>
    <path d="M 32,8 L 32,30 L 56,28 L 56,4 Z" fill="#fcfcfa"/>
    <!-- Text lines -->
    <line x1="8" y1="14" x2="24" y2="15" stroke="#6c6e63" stroke-width="0.8"/>
    <line x1="8" y1="18" x2="22" y2="19" stroke="#6c6e63" stroke-width="0.8"/>
    <line x1="8" y1="22" x2="24" y2="23" stroke="#6c6e63" stroke-width="0.8"/>
    <line x1="36" y1="14" x2="52" y2="13" stroke="#6c6e63" stroke-width="0.8"/>
    <line x1="36" y1="18" x2="50" y2="17" stroke="#6c6e63" stroke-width="0.8"/>
    <line x1="36" y1="22" x2="52" y2="21" stroke="#6c6e63" stroke-width="0.8"/>
  </g>
  <!-- Feet -->
  <ellipse cx="50" cy="108" rx="8" ry="4" fill="#33342d"/>
  <ellipse cx="78" cy="108" rx="8" ry="4" fill="#33342d"/>
</svg>
