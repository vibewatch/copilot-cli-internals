<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="Hedgehog at a terminal">
  <title>Terminal hedgehog</title>
  <!-- Spike cluster -->
  <g fill="#33342d">
    <polygon points="30,40 36,22 42,40"/>
    <polygon points="40,36 46,16 52,36"/>
    <polygon points="50,34 56,14 62,34"/>
    <polygon points="60,36 66,16 72,36"/>
    <polygon points="70,40 76,22 82,40"/>
    <polygon points="24,48 20,32 32,40"/>
  </g>
  <!-- Body (peeking over terminal) -->
  <ellipse cx="48" cy="64" rx="34" ry="26" fill="#6c6e63"/>
  <!-- Belly -->
  <ellipse cx="48" cy="70" rx="22" ry="14" fill="#eeefe9"/>
  <!-- Face -->
  <ellipse cx="76" cy="60" rx="14" ry="12" fill="#fcfcfa"/>
  <!-- Eye -->
  <circle cx="78" cy="56" r="2" fill="#23251d"/>
  <!-- Nose -->
  <circle cx="88" cy="60" r="3" fill="#23251d"/>
  <!-- Terminal monitor (dark olive!) -->
  <rect x="46" y="74" width="70" height="42" rx="3" fill="#23251d" stroke="#33342d" stroke-width="2"/>
  <!-- Terminal "screen" -->
  <rect x="50" y="78" width="62" height="34" fill="#23251d"/>
  <!-- Terminal prompt: green text + yellow cursor (DESIGN.md accents) -->
  <text x="54" y="92" font-family="ui-monospace, monospace" font-size="9" fill="#2c8c66" font-weight="700">$ posthog</text>
  <text x="54" y="104" font-family="ui-monospace, monospace" font-size="9" fill="#dceaf6">analyze</text>
  <rect x="84" y="97" width="6" height="9" fill="#f7a501"/>
  <!-- Monitor stand -->
  <rect x="76" y="116" width="12" height="4" fill="#33342d"/>
  <rect x="68" y="118" width="28" height="3" fill="#33342d"/>
</svg>
